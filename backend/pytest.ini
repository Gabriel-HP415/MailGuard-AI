# MailGuard-AI — Backend pytest config
#
# Goal: `pytest` from /backend works out of the box without manual env
# variable setup. We set the minimum required env vars here so contributors
# can run the suite even when .env is missing.

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
markers =
    slow: tests that take > 1s
    integration: tests that require a real DB
env =
    APP_ENV=test
    JWT_SECRET_KEY=test_secret_for_pytest_only_xxxxxxxxxxxxxxxxxxxx
    DATABASE_URL=sqlite:///./test_mailguard.db
    AI_PROVIDER=stub
    FIREBASE_ENABLED=false
    CORS_ORIGINS=*
    LOG_LEVEL=WARNING
