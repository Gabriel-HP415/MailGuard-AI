<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — MailGuard-AI</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body>
    <main class="container">
      <div class="card card-mg mg-auth-card">
        <h2 class="mb-3">🛡️ MailGuard-AI</h2>
        <p class="text-muted">Sign in to view your dashboard.</p>

        <form id="login-form" autocomplete="on">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required minlength="8" />
          </div>
          <button type="submit" class="btn btn-primary w-100" id="submit-btn">
            <span id="submit-label">Sign in</span>
          </button>
        </form>

        <p class="text-center mt-3 mb-0 text-muted">
          No account? <a href="/register.html">Register</a>
          &nbsp;·&nbsp;
          <a href="#" id="settings-link">Backend settings</a>
        </p>

        <div id="settings-panel" class="mt-3" hidden>
          <label class="form-label small text-muted">Backend URL</label>
          <input type="text" class="form-control form-control-sm" id="base-url-input"
                 placeholder="http://localhost:8000/api/v1" />
          <button class="btn btn-sm btn-outline-secondary mt-2" id="save-base-url">Save</button>
        </div>

        <div id="error-msg" class="alert alert-danger mt-3" hidden></div>
      </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
