# MailGuard-AI — Local development stack
#
# This file is for daily development. It deliberately uses Postgres (not
# MySQL) because the supabase/CI configs already use Postgres, keeping the
# dev→CI→prod story in one database engine. The prod compose at
# ../deployment/docker-compose.yml uses MySQL and remains untouched.
#
# Quickstart:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml exec backend alembic upgrade head
#   docker compose -f docker-compose.dev.yml exec backend python -m app.database.seed
#
# Then in another terminal:
#   chrome_extension -> load unpacked, point Options page to http://localhost:8000/api/v1
#   frontend/ -> docker compose -f docker-compose.dev.yml --profile frontend up -d

version: "3.9"

x-common-env: &common-env
  APP_ENV: development
  LOG_LEVEL: DEBUG
  APP_DEBUG: "true"
  CORS_ORIGINS: "chrome-extension://*,http://localhost:5500,http://localhost:3000,http://localhost:8080"
  BACKEND_URL: http://localhost:8000

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailguard_ai
      POSTGRES_USER: mailguard
      POSTGRES_PASSWORD: mailguard_dev
    ports:
      - "5433:5432"  # 5433 to avoid conflict with any system Postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deployment/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailguard -d mailguard_ai"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - mg_dev_net

  adminer:
    # Web UI on http://localhost:8081 — login with the postgres creds above.
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mg_dev_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg2://mailguard:mailguard_dev@postgres:5432/mailguard_ai
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mailguard_ai
      DB_USER: mailguard
      DB_PASSWORD: mailguard_dev
      JWT_SECRET_KEY: dev_secret_only_for_local_${DEV_USER:-me}_change_in_prod
      JWT_ALGORITHM: HS256
      AI_PROVIDER: stub          # use the deterministic stub classifier — no Gemini key needed
      GEMINI_API_KEY:
      GEMINI_MODEL: stub
      FIREBASE_ENABLED: "false"  # disable Firebase in dev — use the Gmail OAuth path
      RATE_LIMIT_PER_MINUTE: "1000"  # disable effective rate limit in dev
    volumes:
      - ./backend:/app
      - backend_pip_cache:/root/.cache/pip
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.database.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    networks:
      - mg_dev_net

  ai_service:
    profiles: ["ai"]   # opt-in: docker compose --profile ai -f docker-compose.dev.yml up
    build:
      context: ./ai_service
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      INFERENCE_DEVICE: cpu
      BACKEND_URL: http://backend:8000
    volumes:
      - ./ai_service:/app
      - ai_data:/app/data
      - ai_models:/app/models/artifacts
    ports:
      - "8002:8000"
    networks:
      - mg_dev_net

volumes:
  pg_data:
  backend_pip_cache:
  ai_data:
  ai_models:

networks:
  mg_dev_net:
    driver: bridge
